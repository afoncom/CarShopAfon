name: Tests

on:
  push:
    branches: [ main, update-from-18.01 ]
  pull_request:
    branches: [ main, update-from-18.01 ]

jobs:
  test:
    runs-on: macos-latest
    steps:
    - uses: actions/checkout@v4
    - name: Run tests
      run: |
        set -o pipefail
        xcodebuild test -project CarsharingAfon.xcodeproj -scheme CarsharingAfon -destination 'platform=iOS Simulator,name=iPhone SE (3rd generation),OS=18.6' -enableCodeCoverage YES 2>&1 | tee xcodebuild.log
        if grep -q "Unable to locate device\|No simulators are available" xcodebuild.log; then
          echo "ERROR: Device selection failed"
          exit 1
        fi
    - name: Upload logs if failed
      if: failure()
      uses: actions/upload-artifact@v4
      with:
        name: xcodebuild-log
        path: xcodebuild.log
